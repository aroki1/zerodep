{{- $href := .Destination | safeURL -}}
{{- $isExternal := or (strings.HasPrefix .Destination "https://") (strings.HasPrefix .Destination "http://") -}}
<a href="{{ $href }}"{{ with .Title }} title="{{ . }}"{{ end }}{{ if $isExternal }} target="_blank" rel="noreferrer"{{ end }}>{{ .Text | safeHTML }}</a>
